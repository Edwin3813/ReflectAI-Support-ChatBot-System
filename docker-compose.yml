services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./server/src/storage/vector/chroma:/data
    environment:
      - ALLOW_RESET=true
    restart: unless-stopped

  rag:
    build:
      context: ./server
      dockerfile: rag_service/Dockerfile
    container_name: reflectai-rag
    ports:
      - "8001:8001"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: reflectai-server
    ports:
      - "5000:5000"
    volumes:
      - ./server/src/storage/db:/app/src/storage/db
      - ./server/src/storage/users:/app/src/storage/users
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - RAG_SERVICE_URL=http://rag:8001
    depends_on:
      - rag
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: reflectai-client
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    environment:
      - VITE_API_BASE=http://localhost:5000
    depends_on:
      - server
    restart: unless-stopped